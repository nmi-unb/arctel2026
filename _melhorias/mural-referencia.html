<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mural de Avisos — referência (1c)</title>
<link rel="stylesheet" href="./assets/css/main.css">
<style>
body{margin:0}
.badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:5px 12px;border-radius:14px;white-space:nowrap}
.badge__dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.badge--confirmada{background:#e9f8ee;color:var(--verde-700)}
.badge--confirmada .badge__dot{background:var(--verde-600)}
.badge--live{background:var(--navy-700);color:#fff}
.badge--live .badge__dot{background:#ff6161}
@media (prefers-reduced-motion: no-preference){.badge--live .badge__dot{animation:pulse 1.6s ease-in-out infinite}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

.split-panel{display:grid;grid-template-columns:1.1fr 1fr;border:1px solid var(--color-gray-200);border-radius:12px;overflow:hidden;max-width:var(--container-max-width);margin:0 auto}
.split-col{padding:20px 22px}
.split-col--left{border-right:1px solid var(--color-gray-200)}
.split-col--right{background:#f6fbf8}
.split-col__title{font-size:15px;font-weight:800;color:var(--navy-700);margin:8px 0 4px}
.split-col__msg{font-size:13px;color:#555;margin:0}
.split-strip{display:flex;justify-content:space-between;align-items:center;padding:12px 22px;font-size:12px;color:#777;border-top:1px solid var(--color-gray-200);max-width:var(--container-max-width);margin:0 auto;border-left:1px solid var(--color-gray-200);border-right:1px solid var(--color-gray-200);border-radius:0 0 12px 12px}
.split-strip button{background:none;border:1px solid var(--verde-600);color:var(--verde-700);font-size:12px;font-weight:700;padding:7px 14px;border-radius:18px;cursor:pointer}
.split-strip button:hover{background:var(--verde-600);color:#fff}
.split-strip button:focus-visible{outline:2px solid var(--navy-700);outline-offset:2px}

@media (max-width:640px){
  .split-panel{grid-template-columns:1fr}
  .split-col--left{border-right:none;border-bottom:1px solid var(--color-gray-200)}
  .split-strip{flex-direction:column;align-items:flex-start;gap:8px}
}
</style>
</head>
<body>
<main>
<section class="section-avisos container" id="avisos" style="padding:48px var(--grid-margin)">
<h2 class="section-title">Avisos</h2>

<div data-fill="avisos-json">
  <div class="split-panel">
    <div class="split-col split-col--left" data-fill="aviso-destaque">
      <span class="badge badge--confirmada"><span class="badge__dot"></span>[[TIPO_DO_AVISO]]</span>
      <p class="split-col__title">[[TITULO_DO_AVISO]]</p>
      <p class="split-col__msg">[[MENSAGEM_PRINCIPAL]] · [[DATA_DO_AVISO]]</p>
    </div>
    <div class="split-col split-col--right" data-fill="aula-atual-ou-proxima">
      <span class="badge badge--live"><span class="badge__dot"></span>Ao vivo agora</span>
      <p class="split-col__title">Módulo 1 — Impactos do Ecossistema Digital</p>
      <p class="split-col__msg">[[HORARIO]]</p>
      <a class="btn btn--solid btn--sm" href="#" style="margin-top:8px;display:inline-block" data-fill="url-transmissao">Acessar aula ao vivo</a>
    </div>
  </div>
  <div class="split-strip" data-fill="info-complementar">
    <span>Última atualização: [[DATA_E_HORA]]</span>
    <button type="button" id="btn-historico" aria-haspopup="dialog" aria-controls="modal-historico">Ver histórico de avisos</button>
  </div>
</div>
</section>
</main>
</body>
</html>
